server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Slidev SPA sub-paths — any /{slug}/slides/... path falls back to its own SPA entry
    location ~ ^/([^/]+)/slides/ {
        try_files $uri /$1/slides/index.html;
    }

    # Astro wrapper pages — any /{slug}/... path falls back to its own index
    location ~ ^/([^/]+)/ {
        try_files $uri /$1/index.html;
    }

    # Main Astro app
    location / {
        try_files $uri /index.html;
    }

    error_page 404 /index.html;
}
